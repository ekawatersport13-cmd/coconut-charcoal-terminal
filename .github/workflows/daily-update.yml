name: Daily Price Update

on:
  schedule:
    # 北京时间 08:00 = UTC 00:00
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write     # 推送 commits
  actions: write      # workflow_dispatch 触发

jobs:
  update-prices:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Debug — check structure
        run: |
          echo "=== Repo root ==="
          ls -la
          echo "=== Python version ==="
          python --version

      - name: Run price_updater
        run: python price_updater.py --force

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.js
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto: update prices $(date +'%Y-%m-%d')"
            git push
          fi
